<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Amrum Bus"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Amrum Bus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;min-height:100dvh;overflow-x:hidden;padding-bottom:calc(20px + env(safe-area-inset-bottom));overscroll-behavior:none}
.wrap{max-width:390px;margin:0 auto}
.header{background:linear-gradient(135deg,#b22222,#8b0000);padding:calc(48px + env(safe-area-inset-top)) 20px 20px;color:#fff}
.header-sub{font-size:12px;opacity:.8;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.header-title{font-size:26px;font-weight:700;margin-bottom:12px}
.date-time-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.date-time-row input{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 10px;font-size:15px;font-weight:600;color-scheme:dark}
.date-time-row button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
.day-badge{background:rgba(255,255,255,.2);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;color:#fff;white-space:nowrap}
.section{padding:12px 16px 0}
.section-label{font-size:12px;color:#8e8e93;margin-bottom:4px;padding-left:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.route-card{background:#fff;border-radius:14px;padding:4px 0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stop-row{display:flex;align-items:center;padding:12px 16px;gap:8px;cursor:pointer}
.stop-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.stop-icon.von{background:#e8f4fd;color:#0077b6}
.stop-icon.nach{background:#fef3e2;color:#e07b00}
.stop-btn-inner{flex:1;min-width:0}
.slabel{font-size:11px;color:#8e8e93;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.sname{font-size:15px;font-weight:600;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-btn-arrow{color:#b22222;font-size:18px;flex-shrink:0}
.stop-divider{height:1px;background:#f2f2f7;margin:0 16px}
.swap-row{display:flex;justify-content:center;padding:2px 0}
.swap-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 16px;color:#b22222}
.locate-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.locate-btn{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;background:#0077b6;color:#fff;font-size:15px;font-weight:600}
.locate-msg{font-size:14px;color:#555;text-align:center;padding:6px 0;line-height:1.4}
.locate-result{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.locate-name{font-size:16px;font-weight:700;color:#1c1c1e}
.locate-dist{font-size:13px;color:#8e8e93;white-space:nowrap;text-align:right}
.locate-route-btn{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;background:#34C759;color:#fff;font-size:15px;font-weight:600}
.locate-retry{width:100%;margin-top:8px;padding:10px;border:none;border-radius:10px;cursor:pointer;background:#f2f2f7;color:#1c1c1e;font-size:14px;font-weight:600}
.event-row{padding:11px 0;border-bottom:1px solid #f2f2f7}
.event-row:last-child{border-bottom:none}
.event-time{font-size:13px;font-weight:700;color:#8a3ab9}
.event-title{font-size:15px;font-weight:600;color:#1c1c1e;margin-top:1px}
.event-loc{font-size:12px;color:#8e8e93;margin-top:1px}
.events-fallback-btn{width:100%;margin-top:6px;padding:10px;border:none;border-radius:10px;cursor:pointer;background:#8a3ab9;color:#fff;font-size:14px;font-weight:600;text-decoration:none;display:block;text-align:center}
.event-tip{margin:6px 16px 0;background:linear-gradient(135deg,#6a1b9a,#8a3ab9);border-radius:14px;padding:14px 16px;color:#fff}
.event-tip-label{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.event-tip-title{font-size:15px;font-weight:700;margin-bottom:2px}
.event-tip-time{font-size:13px;opacity:.85}
.event-tip-link{display:inline-block;margin-top:8px;font-size:13px;color:rgba(255,255,255,.9);text-decoration:underline}
.result-card{margin:14px 16px 0;background:linear-gradient(135deg,#0077b6,#005f8e);border-radius:16px;padding:20px;color:#fff;box-shadow:0 4px 12px rgba(0,119,182,.3)}
.result-sub{font-size:12px;opacity:.8;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.result-times{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.result-time{font-size:42px;font-weight:700;line-height:1}
.result-arrow{font-size:20px;opacity:.7}
.result-arr{font-size:28px;font-weight:600;opacity:.9}
.result-detail{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.result-dur{font-size:14px;opacity:.8}
.result-mins{font-size:22px;font-weight:700}
.result-minslabel{font-size:11px;opacity:.7;text-align:right}
.warning{margin:8px 16px 0;background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#7d4e00}
.empty{margin:14px 16px 0;background:#fff;border-radius:16px;padding:20px;text-align:center;color:#8e8e93;font-size:15px}
.next-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dep-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f2f2f7}
.dep-row:last-child{border-bottom:none}
.dep-bar{width:4px;height:40px;border-radius:2px;margin-right:14px;flex-shrink:0;background:#0077b6}
.dep-info{flex:1}
.dep-times{display:flex;align-items:center;gap:6px}
.dep-t{font-size:17px;font-weight:700;color:#1c1c1e}
.dep-arr{font-size:14px;color:#555}
.dep-warn{font-size:12px;color:#b8860b;font-weight:600;margin-top:2px}
.dep-mins{font-size:13px;font-weight:600;color:#0077b6;white-space:nowrap}
.ferry-times{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ferry-pill{padding:5px 10px;border-radius:8px;font-size:14px;font-weight:600}
.footer{text-align:center;font-size:11px;color:#c7c7cc;margin-top:20px;padding:0 20px 20px}
.overlay{display:none;position:fixed;inset:0;z-index:100;background:#f2f2f7;flex-direction:column}
.overlay.open{display:flex}
.overlay-head{padding:calc(16px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;color:#fff}
.overlay-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;flex-shrink:0}
.overlay-body{overflow-y:auto;flex:1;padding:12px 16px;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-sub">Amrum Bus</div>
    <div class="header-title">Verbindungssuche</div>
    <div class="date-time-row">
      <input type="date" id="dateinput" oninput="render()"/>
      <input type="time" id="timeinput" oninput="render()"/>
      <button onclick="setNow()">Jetzt</button>
    </div>
    <div class="date-time-row">
      <span class="day-badge" id="dayBadge">–</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Route</div>
    <div class="route-card">
      <div class="stop-row" onclick="openPicker('von')">
        <div class="stop-icon von">A</div>
        <div class="stop-btn-inner">
          <div class="slabel">Von</div>
          <div class="sname" id="vonLabel">Wittdün Fähranleger</div>
        </div>
        <span class="stop-btn-arrow">›</span>
      </div>
      <div class="stop-divider"></div>
      <div class="swap-row"><button class="swap-btn" onclick="swapStops()">⇅</button></div>
      <div class="stop-divider"></div>
      <div class="stop-row" onclick="openPicker('nach')">
        <div class="stop-icon nach">B</div>
        <div class="stop-btn-inner">
          <div class="slabel">Nach</div>
          <div class="sname" id="nachLabel">Norddorf Mitte</div>
        </div>
        <span class="stop-btn-arrow">›</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">📍 Nächste Haltestelle</div>
    <div class="locate-card" id="locateCard">
      <button class="locate-btn" onclick="locateNearestStop()">📍 Meinen Standort verwenden</button>
    </div>
  </div>

  <div id="resultArea"></div>
  <div id="warnArea"></div>
  <div class="section" id="nextArea" style="display:none">
    <div class="section-label">Weitere Verbindungen</div>
    <div class="next-card" id="nextList"></div>
  </div>

  <div class="section">
    <div class="section-label">🌊 Gezeiten</div>
    <div id="tideArea"></div>
  </div>

  <div class="section">
    <div class="section-label">🎉 Veranstaltungen heute</div>
    <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <div style="display:flex;gap:6px;margin-bottom:10px" id="eventsFilterRow"></div>
      <div id="eventsArea"><div class="locate-msg">Lade Veranstaltungen…</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">⛴ Fährabfahrten</div>
    <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <div class="ferry-times" id="ferryTimes"></div>
    </div>
  </div>
  <div class="footer">Fahrplan 21.3.–26.6.2026 · Mo–Fr ohne Feiertage &amp; Ferien</div>
</div>

<!-- Haltestellen Picker -->
<div class="overlay" id="picker">
  <div class="overlay-head" style="background:#b22222">
    <button class="overlay-back" onclick="closePicker()">‹</button>
    <input style="flex:1;padding:8px 12px;border-radius:20px;border:none;font-size:15px;outline:none" type="text" id="pickerSearch" placeholder="Haltestelle suchen…" oninput="filterPicker(this.value)"/>
  </div>
  <div class="overlay-body" id="pickerList"></div>
</div>

<!-- Gezeiten Vorhersage -->
<div class="overlay" id="tideForecast">
  <div class="overlay-head" style="background:linear-gradient(135deg,#0077b6,#005f8e)">
    <button class="overlay-back" onclick="document.getElementById('tideForecast').classList.remove('open')">‹</button>
    <div style="flex:1">
      <div style="font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:1px">7-Tage Vorhersage</div>
      <div style="font-size:18px;font-weight:700" id="forecastTitle">Wittdün</div>
    </div>
    <input type="date" id="tideDatePicker" oninput="renderForecast()"
      style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 8px;font-size:13px;font-weight:600;color-scheme:dark"/>
  </div>
  <div class="overlay-body" id="forecastBody"></div>
</div>

// ── Hilfsfunktionen ───────────────────────────────────────────────────────────
function toMin(t){if(!t)return Infinity;const[h,m]=t.split(":").map(Number);return h*60+m;}
function minsLabel(d){if(d===0)return"jetzt";if(d<60)return d+" Min.";return Math.floor(d/60)+"h "+d%60+"m";}
function durLabel(dep,arr){return(toMin(arr)-toMin(dep))+" Min. Fahrt";}
function getNowStr(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function getTodayStr(){return new Date().toISOString().slice(0,10);}
function pad2(n){return String(n).padStart(2,"0");}

function getDateInfo(){
  const d=new Date(document.getElementById("dateinput").value+"T12:00:00");
  const dow=d.getDay();
  const names=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
  return{isSaSo:dow===0||dow===6,isFr:dow===5,dayName:names[dow]};
}
function getDayType(){const{isSaSo,isFr}=getDateInfo();return isSaSo?"saso":isFr?"fr":"mofr";}

function isFaehrbus(t,dt){
  const m=toMin(t);
  const arr=FERRY_ARR[dt]||FERRY_ARR.mofr;
  const dep=(FERRY[dt]||FERRY.mofr).map(toMin);
  return arr.some(fa=>m>=fa&&m<=fa+20)||dep.some(fd=>m<=fd&&fd-m<=30);
}
function getDirection(von,nach){
  const vi=ROUTE_ORDER.indexOf(von),ni=ROUTE_ORDER.indexOf(nach);
  if(vi===-1||ni===-1||vi===ni)return null;
  return ni>vi;
}
function getConnections(von,nach,nowMin,dt){
  const dir=getDirection(von,nach);
  if(dir===null)return[];
  const tbl=dir?(dt==="saso"?SASO_N:MOFR_N):(dt==="saso"?SASO_S:MOFR_S);
  const res=[];
  const depT=tbl[von]||[],arrT=tbl[nach]||[];
  for(let i=0;i<depT.length;i++){
    if(!depT[i]||!arrT[i])continue;
    if(toMin(depT[i])<nowMin)continue;
    res.push({dep:depT[i],arr:arrT[i],warn:isFaehrbus(depT[i],dt)});
  }
  return res.slice(0,5);
}
function getReachable(von){
  const vi=ROUTE_ORDER.indexOf(von);
  if(vi===-1)return ROUTE_ORDER.filter(s=>s!==von);
  return[...ROUTE_ORDER.slice(vi+1),...ROUTE_ORDER.slice(0,vi)];
}

// ── Gezeitenrechner ───────────────────────────────────────────────────────────
const TIDE_CONST=[
  {amp:145.2,phase:107.3,speed:28.9841},
  {amp:47.1, phase:136.8,speed:30.0000},
  {amp:28.4, phase:88.5, speed:28.4397},
  {amp:12.8, phase:138.2,speed:30.0821},
  {amp:9.2,  phase:219.4,speed:15.0411},
  {amp:6.8,  phase:189.2,speed:13.9430},
  {amp:8.1,  phase:251.6,speed:57.9682},
  {amp:4.2,  phase:268.4,speed:58.9841},
  {amp:2.1,  phase:312.5,speed:86.9523},
];
const TIDE_MEAN=148;
const TIDE_OFFSET={wittduen:0,nebel:8,norddorf:12};

function tideHeight(ts,offsetMin){
  const h=(ts+offsetMin*60000)/3600000;
  let lev=TIDE_MEAN;
  for(const c of TIDE_CONST) lev+=c.amp*Math.cos((c.speed*h-c.phase)*Math.PI/180);
  return Math.round(lev);
}
function getTidesForDay(date,loc){
  const off=TIDE_OFFSET[loc]||0;
  const start=new Date(date);start.setHours(0,0,0,0);
  const end=new Date(date);end.setHours(23,59,0,0);
  const res=[];
  let prev=tideHeight(start.getTime(),off),prevDir=0;
  for(let t=start.getTime();t<=end.getTime();t+=6*60000){
    const h=tideHeight(t,off);
    const dir=h>prev?1:h<prev?-1:prevDir;
    if(prevDir===1&&dir===-1) res.push(refine(t-6*60000,t+6*60000,off,true));
    else if(prevDir===-1&&dir===1) res.push(refine(t-6*60000,t+6*60000,off,false));
    prev=h;if(dir!==0)prevDir=dir;
  }
  return res;
}
function refine(t1,t2,off,findMax){
  let best={t:t1,h:tideHeight(t1,off),type:findMax?"HW":"NW"};
  for(let t=t1;t<=t2;t+=60000){
    const h=tideHeight(t,off);
    if(findMax?h>best.h:h<best.h) best={t,h,type:findMax?"HW":"NW"};
  }
  best.time=new Date(best.t);
  return best;
}
function fmtT(d){return pad2(d.getHours())+":"+pad2(d.getMinutes());}

let tideLocation="wittduen";

function renderTides(){
  const el=document.getElementById("tideArea");
  if(!el)return;
  const tides=getTidesForDay(new Date(),tideLocation);
  const now=Date.now();
  const next=tides.find(t=>t.time.getTime()>now);
  const locs={wittduen:"Wittdün",nebel:"Nebel",norddorf:"Norddorf"};

  const btns=Object.keys(locs).map(function(loc){
    const active=tideLocation===loc;
    return '<button onclick="tideLocation=\''+loc+'\';renderTides()" style="flex:1;padding:6px 4px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:'+(active?'#0077b6':'#f2f2f7')+';color:'+(active?'#fff':'#555')+'">'+locs[loc]+'</button>';
  }).join("");

  let nextHtml="";
  if(next){
    nextHtml='<div style="background:#e8f4fd;border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:11px;color:#0077b6;font-weight:700;text-transform:uppercase">Nächste '+(next.type==="HW"?"🌊 Flut":"🏝 Ebbe")+'</div>'
      +'<div style="font-size:24px;font-weight:700;color:#0077b6">'+fmtT(next.time)+'</div></div>'
      +'<div style="text-align:right"><div style="font-size:22px;font-weight:700;color:#0077b6">'+next.h+' cm</div>'
      +'<div style="font-size:11px;color:#8e8e93">über PNP</div></div></div>';
  }

  const cards=tides.map(function(t){
    const isPast=t.time.getTime()<now;
    const isNext=next&&t.time.getTime()===next.time.getTime();
    const bg=isNext?'#0077b6':isPast?'#f9f9f9':'#f2f8ff';
    const col=isNext?'#fff':'#1c1c1e';
    const sub=isNext?'rgba(255,255,255,.8)':'#8e8e93';
    const val=isNext?'rgba(255,255,255,.9)':'#0077b6';
    return '<div style="background:'+bg+';border-radius:10px;padding:10px;opacity:'+(isPast?'0.45':'1')+'">'
      +'<div style="font-size:11px;font-weight:700;color:'+sub+';text-transform:uppercase">'+(t.type==="HW"?"🌊 Hochwasser":"🏝 Niedrigwasser")+'</div>'
      +'<div style="font-size:20px;font-weight:700;color:'+col+'">'+fmtT(t.time)+'</div>'
      +'<div style="font-size:14px;font-weight:600;color:'+val+'">'+t.h+' cm</div></div>';
  }).join("");

  el.innerHTML='<div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">'
    +'<div style="display:flex;gap:6px;margin-bottom:12px">'+btns+'</div>'
    +nextHtml
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+cards+'</div>'
    +'<button onclick="openTideForecast()" style="width:100%;margin-top:10px;padding:10px;border:none;border-radius:10px;cursor:pointer;background:#0077b6;color:#fff;font-size:14px;font-weight:600">📅 7-Tage Vorhersage</button>'
    +'</div>';
}

function renderForecast(){
  const locs={wittduen:"Wittdün",nebel:"Nebel",norddorf:"Norddorf"};
  document.getElementById("forecastTitle").textContent=locs[tideLocation];
  const val=document.getElementById("tideDatePicker").value;

  for(let i=0;i<7;i++){

      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+tideCards+'</div></div>';
  }
  document.getElementById("forecastBody").innerHTML=html;
}

        +'<div class="dep-bar"></div><div class="dep-info">'
        +'<div class="dep-times"><span class="dep-t">'+c.dep+'</span><span class="dep-arr">→ '+c.arr+'</span></div>'
        +'<div style="font-size:12px;color:#8e8e93">'+durLabel(c.dep,c.arr)+'</div>'
        +(c.warn?'<div class="dep-warn">🚨 Achtung Fährbus – könnte voll sein!</div>':'')
        +'</div><div class="dep-mins">'+minsLabel(toMin(c.dep)-nowMin)+'</div></div>';
    }).join("");
  } else {na.style.display="none";}
  const ft=document.getElementById("ferryTimes");
  ft.innerHTML=(FERRY[dt]||FERRY.mofr).map(function(t){
    return '<span class="ferry-pill" style="background:'+(toMin(t)>=nowMin?'#fff3e0':'#f2f2f7')+';color:'+(toMin(t)>=nowMin?'#e07b00':'#aaa')+'">'+t+'</span>';
  }).join("");
}

function setNow(){
  document.getElementById("dateinput").value=getTodayStr();
  document.getElementById("timeinput").value=getNowStr();
  window._manualTime=false;render();
}
function swapStops(){var t=curVon;curVon=curNach;curNach=t;render();}

// ── Nächste Haltestelle (Geolocation) ─────────────────────────────────────────
let _lastFix=null;

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1),dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function distLabel(m){
  if(m<1000)return(Math.round(m/10)*10)+" m";
  return(m/1000).toFixed(1).replace(".",",")+" km";
}
function locateNearestStop(){
  const card=document.getElementById("locateCard");
  if(!("geolocation" in navigator)){
    card.innerHTML='<div class="locate-msg">Standortbestimmung wird von diesem Browser nicht unterstützt.</div>';
    return;
  }
  card.innerHTML='<div class="locate-msg">Standort wird ermittelt…</div>';
  navigator.geolocation.getCurrentPosition(function(pos){
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    let nearest=null,nearestDist=Infinity;
    for(const name in STOP_COORDS){
      const c=STOP_COORDS[name];
      const d=haversine(lat,lon,c[0],c[1]);
      if(d<nearestDist){nearestDist=d;nearest=name;}
    }
    _lastFix={lat:lat,lon:lon};
    card.innerHTML='<div class="locate-result"><div class="locate-name">'+nearest+'</div>'
      +'<div class="locate-dist">Luftlinie<br>ca. '+distLabel(nearestDist)+'</div></div>'
      +'<button class="locate-route-btn" onclick="openWalkRoute(\''+nearest.replace(/'/g,"\\'")+'\')">🚶 Fußweg-Route öffnen</button>'
      +'<button class="locate-retry" onclick="locateNearestStop()">Standort aktualisieren</button>';
  },function(err){
    let msg="Standort konnte nicht ermittelt werden. Bitte erneut versuchen.";
    if(err.code===err.PERMISSION_DENIED)msg="Standortzugriff wurde verweigert. Bitte in den iPhone-Einstellungen unter Datenschutz &amp; Sicherheit → Ortungsdienste für Safari-Websites erlauben.";
    else if(err.code===err.TIMEOUT)msg="Standortbestimmung hat zu lange gedauert. Bitte erneut versuchen.";
    card.innerHTML='<div class="locate-msg">'+msg+'</div><button class="locate-retry" onclick="locateNearestStop()">Erneut versuchen</button>';
  },{enableHighAccuracy:true,timeout:10000,maximumAge:30000});
}
function openWalkRoute(stop){
  const coords=STOP_COORDS[stop];
  if(!coords||!_lastFix)return;
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const url=isIOS
    ?"https://maps.apple.com/?saddr="+_lastFix.lat+","+_lastFix.lon+"&daddr="+coords[0]+","+coords[1]+"&q="+encodeURIComponent(stop)+"&dirflg=w"
    :"https://www.google.com/maps/dir/?api=1&origin="+_lastFix.lat+","+_lastFix.lon+"&destination="+coords[0]+","+coords[1]+"&travelmode=walking";
  window.open(url,"_blank");
}

let curVon="Wittdün Fähranleger",curNach="Norddorf Mitte",pickerTarget="von";

// ── Veranstaltungen heute (Variante A: RSS-Feed / Variante B: Fallback-Link) ──
// WICHTIG – vor dem Hochladen zu Hause prüfen:
// Diese Feed-URL stammt vom "Nordfrieslandkalender" (der Datenquelle hinter amrum.de/veranstaltungskalender).
// Sie wurde über eine fremde Partner-Einbindung gefunden (waid=2 gehört vermutlich zu einem anderen Anbieter,
// z.B. dem Kino Amrum) und liefert daher evtl. nicht nur Amrum-Termine oder ggf. gar keine.
// → Bitte auf https://www.nordfrieslandkalender.de/Veranstaltungskalender-in-eigene-Webseite-einbinden.htm
//   selbst einen eigenen Feed-Link erzeugen (Veranstaltungsort: "Amrum, alle Dörfer" / "Amrum, inselweit"
//   auswählen) und die Konstante EVENTS_FEED_URL unten damit ersetzen.
const EVENTS_FEED_URL="https://www.nordfrieslandkalender.de/city_info/display/feed/rss_event.cfm?region_id=5&eventAmount=100&eventType=event&event_image_types=1&groupByDay=false&waid=2&template=257&sworte=9,11,6,4,10,12,8&keyword_group=2&type=rss2_0&imgSize=0";
const EVENTS_FALLBACK_URL="https://www.amrum.de/veranstaltungskalender";
const EVENTS_VILLAGES={alle:"Alle",wittduen:"Wittdün",nebel:"Nebel",norddorf:"Norddorf"};

let _eventsCache=null,eventsVillage="alle";

function matchVillage(text,village){
  if(village==="alle")return true;
  const t=(text||"").toLowerCase();
  if(village==="wittduen")return t.includes("wittdün")||t.includes("wittduen");
  if(village==="nebel")return t.includes("nebel");
  if(village==="norddorf")return t.includes("norddorf");
  return true;
}
function stopToVillage(stop){
  if(!stop)return null;
  const s=stop.toLowerCase();
  if(s.includes("wittdün"))return"wittduen";
  if(s.includes("nebel"))return"nebel";
  if(s.includes("norddorf"))return"norddorf";
  return null;
}
// Gibt das erste passende Event zurück, das am heutigen Tag stattfindet
// und zeitlich in einem Fenster [arrMin-30 … arrMin+180] Minuten liegt.
function getEventTip(nachStop,arrTimeStr){
  if(!_eventsCache||!nachStop||!arrTimeStr)return null;
  const village=stopToVillage(nachStop);
  if(!village)return null;
  const arrMin=toMin(arrTimeStr);
  const today=new Date();
  return _eventsCache.find(function(e){
    if(!e.date||isNaN(e.date.getTime()))return false;
    const d=e.date;
    const sameDay=d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
    if(!sameDay)return false;
    if(!matchVillage(e.title+" "+e.desc,village))return false;
    const evMin=d.getHours()*60+d.getMinutes();
    return evMin>=arrMin-30&&evMin<=arrMin+180;
  })||null;
}
function isToday(d){
  if(!d||isNaN(d.getTime()))return false;
  const n=new Date();
  return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
}

function renderEventsFilter(){
  const row=document.getElementById("eventsFilterRow");
  if(!row)return;
  row.innerHTML=Object.keys(EVENTS_VILLAGES).map(function(v){
    const active=eventsVillage===v;
    return '<button onclick="eventsVillage=\''+v+'\';renderEventsList()" style="flex:1;padding:6px 4px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:'+(active?'#8a3ab9':'#f2f2f7')+';color:'+(active?'#fff':'#555')+'">'+EVENTS_VILLAGES[v]+'</button>';
  }).join("");
}

// ── Variante A: RSS-Feed über CORS-Proxy laden und parsen ────────────────────
// Zwei Proxys werden nacheinander versucht; erst wenn beide scheitern greift
// Variante B (Fallback-Link).
const CORS_PROXIES=[
  "https://api.allorigins.win/raw?url=",
  "https://corsproxy.io/?"
];

function fetchViaProxy(proxies,url){
  if(!proxies.length)return Promise.reject(new Error("Alle Proxys fehlgeschlagen"));
  const proxy=proxies[0];
  return fetch(proxy+encodeURIComponent(url))
    .then(function(res){if(!res.ok)throw new Error("HTTP "+res.status);return res.text();})
    .catch(function(){return fetchViaProxy(proxies.slice(1),url);});
}

function loadEvents(){
  renderEventsFilter();
  const el=document.getElementById("eventsArea");
  el.innerHTML='<div class="locate-msg">Lade Veranstaltungen…</div>';
  fetchViaProxy(CORS_PROXIES,EVENTS_FEED_URL).then(function(xmlText){
    const xml=new DOMParser().parseFromString(xmlText,"application/xml");
    if(xml.querySelector("parsererror"))throw new Error("XML ungültig");
    const items=Array.from(xml.querySelectorAll("item"));
    if(!items.length)throw new Error("Feed leer");
    _eventsCache=items.map(function(it){
      const title=(it.querySelector("title")?.textContent||"").trim();
      const desc=(it.querySelector("description")?.textContent||"").trim();
      const link=(it.querySelector("link")?.textContent||"").trim();
      const pubDateRaw=it.querySelector("pubDate")?.textContent||"";
      const date=pubDateRaw?new Date(pubDateRaw):null;
      return{title:title,desc:desc,link:link,date:date};
    });
    renderEventsList();
    render(); // Verbindungskarte neu rendern, damit Veranstaltungstipp erscheint
  }).catch(function(err){
    console.warn("Events: Alle Proxys fehlgeschlagen.",err);
    _eventsCache=null;
    renderEventsFallback();
  });
}

function renderEventsList(){
  const el=document.getElementById("eventsArea");
  renderEventsFilter();
  if(!_eventsCache){renderEventsFallback();return;}
  const todays=_eventsCache.filter(function(e){
    return isToday(e.date)&&matchVillage(e.title+" "+e.desc,eventsVillage);
  });
  if(!todays.length){
    el.innerHTML='<div class="locate-msg">Heute keine Termine gefunden'+(eventsVillage!=="alle"?" für "+EVENTS_VILLAGES[eventsVillage]:"")+'.</div>'
      +'<a class="events-fallback-btn" href="'+EVENTS_FALLBACK_URL+'" target="_blank">📅 Kalender auf amrum.de öffnen</a>';
    return;
  }
  el.innerHTML=todays.map(function(e){
    const time=e.date&&!isNaN(e.date.getTime())?fmtT(e.date):"";
    return '<div class="event-row">'
      +(time?'<div class="event-time">'+time+' Uhr</div>':"")
      +'<div class="event-title">'+e.title+'</div>'
      +(e.link?'<div class="event-loc"><a href="'+e.link+'" target="_blank" style="color:#8a3ab9">Details ›</a></div>':"")
      +'</div>';
  }).join("");
}

// ── Variante B: Fallback, falls Proxy-Abruf scheitert ────────────────────────
function renderEventsFallback(){
  renderEventsFilter();
  const el=document.getElementById("eventsArea");
  el.innerHTML='<div class="locate-msg">Live-Termine konnten nicht geladen werden – bitte Internetverbindung prüfen.</div>'
    +'<a class="events-fallback-btn" href="'+EVENTS_FALLBACK_URL+'" target="_blank">📅 Veranstaltungskalender öffnen</a>'
    +'<button class="locate-retry" onclick="loadEvents()">Erneut versuchen</button>';
}

/* Variante B (Alternative): Statt des Fallback-Links oben kann auch ein <iframe>
   des offiziellen Einbinde-Widgets verwendet werden – dafür auf
   https://www.nordfrieslandkalender.de/Veranstaltungskalender-in-eigene-Webseite-einbinden.htm
   den fertigen <iframe>-Einbettungscode für "Amrum" erzeugen lassen und hier einfügen, z.B.:

   function renderEventsIframe(){
     document.getElementById("eventsArea").innerHTML =
       '<iframe src="HIER_IFRAME_URL_VON_NORDFRIESLANDKALENDER" '
       +'style="width:100%;height:420px;border:none;border-radius:10px"></iframe>';
   }

   Hinweis: Ob die Zielseite das Einbetten per iframe erlaubt (X-Frame-Options), lässt sich
   erst beim Testen im Browser sicher sagen – ggf. bietet der Anbieter dafür einen separaten
   Embed-Code an (siehe Seite oben), der sich von der normalen Seiten-URL unterscheidet. */

function openPicker(target){
  pickerTarget=target;
  document.getElementById("picker").classList.add("open");
  document.getElementById("pickerSearch").value="";
  filterPicker("");
  document.getElementById("pickerSearch").focus();
}
function closePicker(){document.getElementById("picker").classList.remove("open");}
function filterPicker(q){
  const reach=pickerTarget==="nach"?getReachable(curVon):ROUTE_ORDER;
  const sel=pickerTarget==="von"?curVon:curNach;
  document.getElementById("pickerList").innerHTML=ROUTE_ORDER
    .filter(function(s){return s.toLowerCase().includes(q.toLowerCase());})
    .map(function(s){
      const ok=pickerTarget==="von"||reach.includes(s);
      return '<div class="picker-item '+(s===sel?'selected':'')+(ok?'':' disabled')+'" '
        +(ok?'onclick="selectStop(\''+s.replace(/'/g,"\\'")+'\')"':'')+'>'+s+(s===sel?' <span>✓</span>':'')+'</div>';
    }).join("");
}
function selectStop(s){
  if(pickerTarget==="von"){curVon=s;if(curNach===s){curNach=getReachable(s)[0]||s;}}
  else{curNach=s;}
  closePicker();render();
}

document.getElementById("dateinput").value=getTodayStr();
document.getElementById("timeinput").value=getNowStr();
render();
renderTides();
loadEvents();
setInterval(function(){
  if(!window._manualTime){document.getElementById("timeinput").value=getNowStr();render();}
  renderTides();
},3600000); // Gezeiten stündlich neu laden
setInterval(loadEvents,3600000); // Veranstaltungen stündlich neu laden
document.getElementById("timeinput").addEventListener("change",function(){window._manualTime=true;render();});
</script>
