<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Amrum Bus"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Amrum Bus</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;height:100dvh;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(20px + env(safe-area-inset-bottom));overscroll-behavior:none;position:fixed;width:100%;}
  .wrap{max-width:390px;margin:0 auto;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .header{background:linear-gradient(135deg,#b22222,#8b0000);padding:calc(48px + env(safe-area-inset-top)) 20px 20px;color:#fff}
  .header-sub{font-size:12px;opacity:.8;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
  .header-title{font-size:26px;font-weight:700;margin-bottom:12px}
  .date-time-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .date-time-row input{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 10px;font-size:15px;font-weight:600;color-scheme:dark}
  .date-time-row input[type=date]{flex:1.6}
  .date-time-row input[type=time]{flex:1}
  .date-time-row button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
  .info-row{display:flex;gap:6px;align-items:center;margin-bottom:2px}
  .day-badge{font-size:12px;font-weight:700;background:rgba(255,255,255,.2);border-radius:6px;padding:2px 8px}
  .season-badge{font-size:11px;background:rgba(255,255,255,.15);border-radius:6px;padding:2px 8px}
  .out-of-range{margin:14px 16px 0;background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:12px 14px;font-size:14px;color:#7d4e00;font-weight:600}
  .section{padding:12px 16px 0}
  .section-label{font-size:12px;color:#8e8e93;margin-bottom:4px;padding-left:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .route-card{background:#fff;border-radius:14px;padding:4px 0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .stop-row{display:flex;align-items:center;padding:12px 16px;gap:12px}
  .stop-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
  .stop-icon.von{background:#e8f4fd;color:#0077b6}
  .stop-icon.nach{background:#fef3e2;color:#e07b00}
  .stop-btn-inner{flex:1;text-align:left}
  .stop-btn-inner .slabel{font-size:11px;color:#8e8e93;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stop-btn-inner .sname{font-size:16px;font-weight:600;color:#1c1c1e}
  .stop-btn-arrow{color:#b22222;font-size:18px}
  .stop-divider{height:1px;background:#f2f2f7;margin:0 16px}
  .swap-row{display:flex;justify-content:center;padding:2px 0}
  .swap-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 16px;color:#b22222}
  .result-card{margin:14px 16px 0;background:linear-gradient(135deg,#0077b6,#005f8e);border-radius:16px;padding:20px;color:#fff;box-shadow:0 4px 12px rgba(0,119,182,.3)}
  .result-sub{font-size:12px;opacity:.8;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
  .result-times{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .result-time{font-size:42px;font-weight:700;line-height:1}
  .result-arrow{font-size:20px;opacity:.7}
  .result-arr{font-size:28px;font-weight:600;opacity:.9}
  .result-detail{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .result-dur{font-size:14px;opacity:.8}
  .result-mins{font-size:22px;font-weight:700}
  .result-minslabel{font-size:11px;opacity:.7;text-align:right}
  .warning{margin:8px 16px 0;background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#7d4e00}
  .empty{margin:14px 16px 0;background:#fff;border-radius:16px;padding:20px;text-align:center;color:#8e8e93;font-size:15px}
  .next-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .dep-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f2f2f7}
  .dep-row:last-child{border-bottom:none}
  .dep-bar{width:4px;height:40px;border-radius:2px;margin-right:14px;flex-shrink:0;background:#0077b6}
  .dep-info{flex:1}
  .dep-times{display:flex;align-items:center;gap:6px}
  .dep-t{font-size:17px;font-weight:700;color:#1c1c1e}
  .dep-arr{font-size:14px;color:#555}
  .dep-warn{font-size:12px;color:#b8860b;font-weight:600;margin-top:2px}
  .dep-mins{font-size:13px;font-weight:600;color:#0077b6;white-space:nowrap}
  .ferry-times{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .ferry-pill{padding:5px 10px;border-radius:8px;font-size:14px;font-weight:600}
  .footer{text-align:center;font-size:11px;color:#c7c7cc;margin-top:20px;padding:0 20px 20px}
  #picker{display:none;position:fixed;inset:0;z-index:100;background:#fff;flex-direction:column}
  #picker.open{display:flex}
  .picker-head{background:#b22222;padding:calc(16px + env(safe-area-inset-top)) 16px 8px;display:flex;align-items:center;gap:12px}
  .picker-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0}
  .picker-search{flex:1;padding:8px 12px;border-radius:20px;border:none;font-size:15px;outline:none}
  .picker-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
  .picker-item{padding:16px 28px;border-bottom:1px solid #f0f0f0;font-size:16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .picker-item.selected{background:#fff3e0;color:#e07b00;font-weight:700}
  .picker-item.disabled{color:#ccc;pointer-events:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-sub">Amrum Bus</div>
    <div class="header-title">Verbindungssuche</div>
    <div class="date-time-row">
      <input type="date" id="dateinput" oninput="onDateChange()"/>
      <input type="time" id="timeinput" oninput="render()"/>
      <button onclick="setNow()">Jetzt</button>
    </div>
    <div class="info-row">
      <span class="day-badge" id="dayBadge">Sa/So</span>
      <span class="season-badge" id="seasonBadge">🌿 Vorsaison</span>
    </div>
  </div>

  <div id="outOfRange" style="display:none">
    <div class="out-of-range">⚠️ Für dieses Datum liegt kein Fahrplan vor.</div>
  </div>

  <div id="mainContent">
    <div class="section">
      <div class="section-label">Route</div>
      <div class="route-card">
        <div class="stop-row" onclick="openPicker('von')" style="cursor:pointer">
          <div class="stop-icon von">A</div>
          <div class="stop-btn-inner">
            <div class="slabel">Von</div>
            <div class="sname" id="vonLabel">Wittdün Fähranleger</div>
          </div>
          <span class="stop-btn-arrow">›</span>
        </div>
        <div class="stop-divider"></div>
        <div class="swap-row"><button class="swap-btn" onclick="swapStops()">⇅</button></div>
        <div class="stop-divider"></div>
        <div class="stop-row" onclick="openPicker('nach')" style="cursor:pointer">
          <div class="stop-icon nach">B</div>
          <div class="stop-btn-inner">
            <div class="slabel">Nach</div>
            <div class="sname" id="nachLabel">Norddorf Mitte</div>
          </div>
          <span class="stop-btn-arrow">›</span>
        </div>
      </div>
    </div>
    <div id="resultArea"></div>
    <div id="warnArea"></div>
    <div class="section" id="nextArea" style="display:none">
      <div class="section-label">Weitere Verbindungen</div>
      <div class="next-card" id="nextList"></div>
    </div>
    <div class="section">
      <div class="section-label">⛴ Fährabfahrten</div>
      <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <div class="ferry-times" id="ferryTimes"></div>
      </div>
    </div>
    <div class="footer" id="footerText"></div>
  </div>
</div>

<div id="picker">
  <div class="picker-head">
    <button class="picker-back" onclick="closePicker()">‹</button>
    <input class="picker-search" type="text" id="pickerSearch" placeholder="Haltestelle suchen…" oninput="filterPicker(this.value)"/>
  </div>
  <div class="picker-list" id="pickerList"></div>
</div>

// Datum → {season, dayType, inRange}
function getDateInfo(dateStr){
  if(!dateStr) return null;
  const[y,m,d]=dateStr.split("-").map(Number);
  const dt=new Date(y,m-1,d);
  const dow=dt.getDay(); // 0=So,6=Sa
  // Gültigkeitsprüfung: 21.3.2026–13.9.2026
  const start=new Date(2026,2,21), end=new Date(2026,8,13);
  if(dt<start||dt>end) return{inRange:false};
  // Saison
  const hs627=new Date(2026,5,27);
  const season=dt>=hs627?'hs':'vs';
  // Wochentag
  const isSaSo=(dow===0||dow===6);
  return{inRange:true, season, dayType:isSaSo?'saso':'mofr', dow, dateObj:dt};
}

    if(toMin(dep)<nowMin)continue;
    const m=toMin(dep);
    const warn=fd.arr.some(fa=>m>=fa&&m<=fa+20)||fd.dep.map(toMin).some(fd=>m<=fd&&fd-m<=30);
    res.push({dep,arr,warn});
  }
  return res.slice(0,5);
}

function getReachable(von){
  const vi=ROUTE_ORDER.indexOf(von);
  if(vi===-1)return ROUTE_ORDER.filter(s=>s!==von);
  return[...ROUTE_ORDER.slice(vi+1),...ROUTE_ORDER.slice(0,vi)];
}

let curVon="Wittdün Fähranleger", curNach="Norddorf Mitte", pickerTarget="von";

function getTodayStr(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function getNowStr(){
  const d=new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function onDateChange(){render();}

function setNow(){
  window._manualTime=false;
  document.getElementById("dateinput").value=getTodayStr();
  document.getElementById("timeinput").value=getNowStr();
  render();
}

function render(){
  const dateStr=document.getElementById("dateinput").value;
  const timeStr=document.getElementById("timeinput").value;
  const nowMin=toMin(timeStr);
  const info=getDateInfo(dateStr);

  const outOfRange=document.getElementById("outOfRange");
  const mainContent=document.getElementById("mainContent");
  const dayBadge=document.getElementById("dayBadge");
  const seasonBadge=document.getElementById("seasonBadge");

  if(!info||!info.inRange){
    outOfRange.style.display="block";
    mainContent.style.display="none";
    dayBadge.textContent="–";
    seasonBadge.textContent="Kein Fahrplan";
    return;
  }
  outOfRange.style.display="none";
  mainContent.style.display="block";

  const{season,dayType,dow}=info;
  const dowNames={0:"Sonntag",1:"Montag",2:"Dienstag",3:"Mittwoch",4:"Donnerstag",5:"Freitag",6:"Samstag"};
  dayBadge.textContent=dowNames[dow];
  if(season==='hs'){
    seasonBadge.textContent="🌞 Hauptsaison";
    seasonBadge.style.background="rgba(255,200,0,.35)";
    document.getElementById("footerText").innerHTML="Fahrplan 27.6.–13.9.2026 · Mo–Fr ohne Feiertage";
  } else {
    seasonBadge.textContent="🌿 Vorsaison";
    seasonBadge.style.background="rgba(255,255,255,.15)";
    document.getElementById("footerText").innerHTML="Fahrplan 21.3.–26.6.2026 · Mo–Fr ohne Feiertage &amp; Ferien";
  }

  const conns=getConnections(curVon,curNach,nowMin,season,dayType);
  const resultArea=document.getElementById("resultArea");
  const warnArea=document.getElementById("warnArea");
  const nextArea=document.getElementById("nextArea");
  const nextList=document.getElementById("nextList");
  warnArea.innerHTML="";

  if(curVon===curNach){
    resultArea.innerHTML='<div class="empty">Bitte verschiedene Haltestellen wählen.</div>';
    nextArea.style.display="none";
  } else if(!conns.length){
    resultArea.innerHTML='<div class="empty">Keine weiteren Verbindungen heute. 🌙</div>';
    nextArea.style.display="none";
  } else {
    const first=conns[0];
    const diff=toMin(first.dep)-nowMin;
    const dirLabel=getDirection(curVon,curNach)?"→ Norddorf":"→ Wittdün";
    resultArea.innerHTML=`<div class="result-card">
      <div class="result-sub">Nächste Verbindung · ${dirLabel}</div>
      <div class="result-times">
        <div class="result-time">${first.dep}</div>
        <div class="result-arrow">→</div>
        <div class="result-arr">${first.arr}</div>
      </div>
      <div class="result-detail">
        <div class="result-dur">${durLabel(first.dep,first.arr)}</div>
        <div><div class="result-mins">${minsLabel(diff)}</div><div class="result-minslabel">bis Abfahrt</div></div>
      </div>
    </div>`;
    if(first.warn) warnArea.innerHTML=`<div class="warning">🚨 Achtung Fährbus – könnte voll sein!</div>`;
    if(conns.length>1){
      nextArea.style.display="block";
      nextList.innerHTML=conns.slice(1).map((c,i,arr)=>`
        <div class="dep-row" style="${i===arr.length-1?'border-bottom:none':''}">
          <div class="dep-bar"></div>
          <div class="dep-info">
            <div class="dep-times"><span class="dep-t">${c.dep}</span><span class="dep-arr">→ ${c.arr}</span></div>
            <div style="font-size:12px;color:#8e8e93">${durLabel(c.dep,c.arr)}</div>
            ${c.warn?'<div class="dep-warn">🚨 Achtung Fährbus – könnte voll sein!</div>':''}
          </div>
          <div class="dep-mins">${minsLabel(toMin(c.dep)-nowMin)}</div>
        </div>`).join("");
    } else {
      nextArea.style.display="none";
    }
  }

  const fd=FERRY_DATA[season][dayType];
  document.getElementById("ferryTimes").innerHTML=fd.dep.map(t=>`
    <span class="ferry-pill" style="background:${toMin(t)>=nowMin?'#fff3e0':'#f2f2f7'};color:${toMin(t)>=nowMin?'#e07b00':'#aaa'}">${t}</span>
  `).join("");
}

function swapStops(){
  [curVon,curNach]=[curNach,curVon];
  document.getElementById("vonLabel").textContent=curVon;
  document.getElementById("nachLabel").textContent=curNach;
  render();
}
function openPicker(target){
  pickerTarget=target;
  document.getElementById("picker").classList.add("open");
  document.getElementById("pickerSearch").value="";
  filterPicker("");
  document.getElementById("pickerSearch").focus();
}
function closePicker(){document.getElementById("picker").classList.remove("open");}
function filterPicker(q){
  const list=document.getElementById("pickerList");
  const reachable=pickerTarget==="nach"?getReachable(curVon):ROUTE_ORDER;
  const curSel=pickerTarget==="von"?curVon:curNach;
  list.innerHTML=ROUTE_ORDER.filter(s=>s.toLowerCase().includes(q.toLowerCase())).map(s=>{
    const ok=pickerTarget==="von"||reachable.includes(s);
    return`<div class="picker-item ${s===curSel?'selected':''} ${!ok?'disabled':''}" onclick="${ok?`selectStop('${s.replace(/'/g,"\\'")}')`:''}">
      ${s}${s===curSel?' <span>✓</span>':''}
    </div>`;
  }).join("");
}
function selectStop(s){
  if(pickerTarget==="von"){
    curVon=s;
    document.getElementById("vonLabel").textContent=s;
    if(curNach===s){curNach=getReachable(s)[0]||s;document.getElementById("nachLabel").textContent=curNach;}
  } else {
    curNach=s;
    document.getElementById("nachLabel").textContent=s;
  }
  closePicker();
  render();
}

// Init
document.getElementById("dateinput").value=getTodayStr();
document.getElementById("timeinput").value=getNowStr();
render();
setInterval(()=>{
  if(!window._manualTime){
    const today=getTodayStr();
    if(document.getElementById("dateinput").value===today){
      document.getElementById("timeinput").value=getNowStr();
      render();
    }
  }
},60000);
document.getElementById("timeinput").addEventListener("change",()=>{window._manualTime=true;render();});
document.getElementById("dateinput").addEventListener("change",()=>{window._manualTime=true;render();});
</script>
</body>
