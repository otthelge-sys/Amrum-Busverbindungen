<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Insel Bus"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Insel Bus</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;height:100dvh;overflow:hidden;overscroll-behavior:none;}
  .wrap{max-width:390px;margin:0 auto;height:100dvh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
  .header{background:linear-gradient(135deg,#b22222,#8b0000);padding:calc(48px + env(safe-area-inset-top)) 20px 16px;color:#fff}
  .header-sub{font-size:12px;opacity:.8;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
  .header-title{font-size:26px;font-weight:700;margin-bottom:12px}
  /* Insel-Toggle */
  .island-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:10px;padding:2px;margin-bottom:12px}
  .island-toggle button{flex:1;padding:7px 0;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;transition:all .2s}
  .island-toggle button.active{background:#fff;color:#b22222}
  .island-toggle button:not(.active){background:transparent;color:#fff}
  .date-time-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .date-time-row input{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 10px;font-size:15px;font-weight:600;color-scheme:dark}
  .date-time-row input[type=date]{flex:1.6}
  .date-time-row input[type=time]{flex:1}
  .date-time-row button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
  .info-row{display:flex;gap:6px;align-items:center}
  .day-badge{font-size:12px;font-weight:700;background:rgba(255,255,255,.2);border-radius:6px;padding:2px 8px}
  .season-badge{font-size:11px;background:rgba(255,255,255,.15);border-radius:6px;padding:2px 8px}
  .out-of-range{margin:14px 16px 0;background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:12px 14px;font-size:14px;color:#7d4e00;font-weight:600}
  .section{padding:12px 16px 0}
  .section-label{font-size:12px;color:#8e8e93;margin-bottom:4px;padding-left:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .route-card{background:#fff;border-radius:14px;padding:4px 0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .stop-row{display:flex;align-items:center;padding:12px 16px;gap:12px;cursor:pointer}
  .stop-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
  .stop-icon.von{background:#e8f4fd;color:#0077b6}
  .stop-icon.nach{background:#fef3e2;color:#e07b00}
  .stop-btn-inner{flex:1}
  .stop-btn-inner .slabel{font-size:11px;color:#8e8e93;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stop-btn-inner .sname{font-size:16px;font-weight:600;color:#1c1c1e}
  .stop-btn-arrow{color:#b22222;font-size:18px}
  .stop-divider{height:1px;background:#f2f2f7;margin:0 16px}
  .swap-row{display:flex;justify-content:center;padding:2px 0}
  .swap-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 16px;color:#b22222}
  .result-card{margin:14px 16px 0;background:linear-gradient(135deg,#0077b6,#005f8e);border-radius:16px;padding:20px;color:#fff;box-shadow:0 4px 12px rgba(0,119,182,.3)}
  .result-sub{font-size:12px;opacity:.8;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
  .result-times{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .result-time{font-size:42px;font-weight:700;line-height:1}
  .result-arrow{font-size:20px;opacity:.7}
  .result-arr{font-size:28px;font-weight:600;opacity:.9}
  .result-detail{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .result-dur{font-size:14px;opacity:.8}
  .result-mins{font-size:22px;font-weight:700}
  .result-minslabel{font-size:11px;opacity:.7;text-align:right}
  .warning{margin:8px 16px 0;background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#7d4e00}
  .empty{margin:14px 16px 0;background:#fff;border-radius:16px;padding:20px;text-align:center;color:#8e8e93;font-size:15px}
  .next-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .dep-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f2f2f7}
  .dep-row:last-child{border-bottom:none}
  .dep-bar{width:4px;height:40px;border-radius:2px;margin-right:14px;flex-shrink:0;background:#0077b6}
  .dep-info{flex:1}
  .dep-times{display:flex;align-items:center;gap:6px}
  .dep-t{font-size:17px;font-weight:700;color:#1c1c1e}
  .dep-arr{font-size:14px;color:#555}
  .dep-warn{font-size:12px;color:#b8860b;font-weight:600;margin-top:2px}
  .dep-mins{font-size:13px;font-weight:600;color:#0077b6;white-space:nowrap}
  .ferry-times{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .ferry-pill{padding:5px 10px;border-radius:8px;font-size:14px;font-weight:600}
  .footer{text-align:center;font-size:11px;color:#c7c7cc;margin-top:20px;padding:0 20px 20px}
  .update-banner{display:none;position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;border-radius:14px;padding:12px 18px;font-size:14px;font-weight:600;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.3);align-items:center;gap:12px;white-space:nowrap}
  .update-banner button{background:#b22222;border:none;color:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer}
  #picker{display:none;position:fixed;inset:0;z-index:100;background:#fff;flex-direction:column}
  #picker.open{display:flex}
  .picker-head{background:#b22222;padding:calc(16px + env(safe-area-inset-top)) 16px 8px;display:flex;align-items:center;gap:12px}
  .picker-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0}
  .picker-search{flex:1;padding:8px 12px;border-radius:20px;border:none;font-size:15px;outline:none}
  .picker-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
  .picker-item{padding:16px 36px;border-bottom:1px solid #f0f0f0;font-size:16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .picker-item.selected{background:#fff3e0;color:#e07b00;font-weight:700}
  .picker-item.disabled{color:#ccc;pointer-events:none}
</style>
</head>
<body>
<div id="updateBanner" class="update-banner">
  🆕 Update verfügbar <button onclick="doUpdate()">Aktualisieren</button>
</div>
<div class="wrap">
  <div class="header">
    <div class="header-sub">Insel Bus</div>
    <div class="header-title">Verbindungssuche</div>
    <div class="island-toggle">
      <button id="btn-amrum" class="active" onclick="setIsland('amrum')">🏝 Amrum</button>
      <button id="btn-foehr" onclick="setIsland('foehr')">🏝 Föhr</button>
    </div>
    <div class="date-time-row">
      <input type="date" id="dateinput" oninput="onDateChange()"/>
      <input type="time" id="timeinput" oninput="render()"/>
      <button onclick="setNow()">Jetzt</button>
    </div>
    <div class="info-row">
      <span class="day-badge" id="dayBadge">–</span>
      <span class="season-badge" id="seasonBadge">–</span>
    </div>
  </div>

  <div id="outOfRange" style="display:none">
    <div class="out-of-range">⚠️ Für dieses Datum liegt kein Fahrplan vor.</div>
  </div>

  <div id="mainContent">
    <div class="section">
      <div class="section-label">Route</div>
      <div class="route-card">
        <div class="stop-row" onclick="openPicker('von')">
          <div class="stop-icon von">A</div>
          <div class="stop-btn-inner">
            <div class="slabel">Von</div>
            <div class="sname" id="vonLabel">Wittdün Fähranleger</div>
          </div>
          <span class="stop-btn-arrow">›</span>
        </div>
        <div class="stop-divider"></div>
        <div class="swap-row"><button class="swap-btn" onclick="swapStops()">⇅</button></div>
        <div class="stop-divider"></div>
        <div class="stop-row" onclick="openPicker('nach')">
          <div class="stop-icon nach">B</div>
          <div class="stop-btn-inner">
            <div class="slabel">Nach</div>
            <div class="sname" id="nachLabel">Norddorf Mitte</div>
          </div>
          <span class="stop-btn-arrow">›</span>
        </div>
      </div>
    </div>
    <div id="resultArea"></div>
    <div id="warnArea"></div>
    <div class="section" id="nextArea" style="display:none">
      <div class="section-label">Weitere Verbindungen</div>
      <div class="next-card" id="nextList"></div>
    </div>
    <div class="section" id="ferrySection">
      <div class="section-label">⛴ Fährabfahrten</div>
      <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <div class="ferry-times" id="ferryTimes"></div>
      </div>
    </div>
    <div class="footer" id="footerText"></div>
  </div>
</div>

<div id="picker">
  <div class="picker-head">
    <button class="picker-back" onclick="closePicker()">‹</button>
    <input class="picker-search" type="text" id="pickerSearch" placeholder="Haltestelle suchen…" oninput="filterPicker(this.value)"/>
  </div>
  <div class="picker-list" id="pickerList"></div>
</div>

    const trip = [];
    tripStops.forEach(([stop, time]) => {

function getFoehrConnections(von, nach, nowMin, season, dayType) {
  const trips = buildFoehrTrips(season, dayType);
  const results = [];

  for (const trip of trips) {
    const depIdx = trip.findIndex(s => s.stop === von);
    if (depIdx === -1) continue;
    const arrIdx = trip.findIndex((s, i) => i > depIdx && s.stop === nach);
    if (arrIdx === -1) continue;
    const dep = trip[depIdx];
    const arr = trip[arrIdx];
    if (dep.min < nowMin) continue;
    results.push({dep: dep.time, arr: arr.time, warn: false});
  }

  results.sort((a,b) => toMin(a.dep) - toMin(b.dep));
  return results.slice(0, 5);
}

const FOEHR_FERRY = {
  vs: {dep: ["6:00","8:00","10:00","12:00","14:30","16:30","18:00"], arr: []},
  hs: {dep: ["6:00","7:30","9:00","10:30","12:00","13:30","15:00","16:30","18:00"], arr: []}
};

// ═══════════════════════════════════════════════════════════
// GEMEINSAME HILFSFUNKTIONEN
// ═══════════════════════════════════════════════════════════
function toMin(t){if(!t)return Infinity;const[h,m]=t.split(":").map(Number);return h*60+m;}
function minsLabel(d){if(d===0)return"jetzt";if(d<60)return d+" Min.";return Math.floor(d/60)+"h "+d%60+"m";}
function durLabel(dep,arr){return(toMin(arr)-toMin(dep))+" Min. Fahrt";}
function getTodayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function getNowStr(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}

function getDateInfo(dateStr, island) {
  if (!dateStr) return null;
  const [y,m,d] = dateStr.split("-").map(Number);
  const dt = new Date(y,m-1,d);
  const dow = dt.getDay();
  if (island === 'amrum') {
    const start=new Date(2026,2,21), end=new Date(2026,8,13);
    if(dt<start||dt>end) return{inRange:false};
    const season = dt>=new Date(2026,5,27)?'hs':'vs';
    return{inRange:true,season,dayType:(dow===0||dow===6)?'saso':'mofr',dow};
  } else {
    // Föhr: 21.3.–9.8.2026
    const start=new Date(2026,2,21), end=new Date(2026,7,9);
    if(dt<start||dt>end) return{inRange:false};
    const season = dt>=new Date(2026,5,27)?'hs':'vs';
    return{inRange:true,season,dayType:(dow===0||dow===6)?'saso':'mofr',dow};
  }
}

function getAmrumTables(season,dt){
  if(season==='hs') return{n:dt==='saso'?HS_SASO_N:HS_MOFR_N,s:dt==='saso'?HS_SASO_S:HS_MOFR_S};
  return{n:dt==='saso'?VS_SASO_N:VS_MOFR_N,s:dt==='saso'?VS_SASO_S:VS_MOFR_S};
}

function getAmrumDirection(von,nach){
  const vi=AMRUM_ROUTE.indexOf(von),ni=AMRUM_ROUTE.indexOf(nach);
  if(vi===-1||ni===-1||vi===ni)return null;
  return ni>vi;
}

function getAmrumConnections(von,nach,nowMin,season,dt){
  const dir=getAmrumDirection(von,nach);
  if(dir===null)return[];
  const{n,s}=getAmrumTables(season,dt);
  const tbl=dir?n:s;
  const fd=AMRUM_FERRY[season][dt];
  const res=[];
  for(let i=0;i<(tbl[von]||[]).length;i++){
    const dep=tbl[von][i],arr=(tbl[nach]||[])[i];
    if(!dep||!arr||toMin(dep)<nowMin)continue;
    const mv=toMin(dep);
    const warn=fd.arr.some(fa=>mv>=fa&&mv<=fa+20)||fd.dep.map(toMin).some(fd=>mv<=fd&&fd-mv<=30);
    res.push({dep,arr,warn});
  }
  return res.slice(0,5);
}

  }
  outOfRange.style.display="none";
  mainContent.style.display="block";

  const{season,dayType,dow}=info;
  const dowNames={0:"Sonntag",1:"Montag",2:"Dienstag",3:"Mittwoch",4:"Donnerstag",5:"Freitag",6:"Samstag"};

  const isAmrum = curIsland==='amrum';

      "Fahrplan 27.6.–13.9.2026 · Mo–Fr ohne Feiertage":
      "Fahrplan 21.3.–26.6.2026 · Mo–Fr ohne Feiertage &amp; Ferien";
    document.getElementById("ferrySection").style.display="block";
    const fd=AMRUM_FERRY[season][dayType];

      <span class="ferry-pill" style="background:${toMin(t)>=nowMin?'#fff3e0':'#f2f2f7'};color:${toMin(t)>=nowMin?'#e07b00':'#aaa'}">${t}</span>`).join("");

  if(!conns.length){
    resultArea.innerHTML='<div class="empty">Keine weiteren Verbindungen heute. 🌙</div>';

  const first=conns[0];
  const diff=toMin(first.dep)-nowMin;

  // direction: 'von' = welche Ziele sind von fromStop erreichbar
  //            'nach' = von welchen Stationen kommt man zu fromStop
  const dateStr = document.getElementById("dateinput").value;
  const info = getDateInfo(dateStr, 'foehr');
  if (!info || !info.inRange) return new Set(FOEHR_STOPS);
  const trips = buildFoehrTrips(info.season, info.dayType);
  const reachable = new Set();
  for (const trip of trips) {
    if (direction === 'von') {
      const fromIdx = trip.findIndex(s => s.stop === fromStop);
      if (fromIdx === -1) continue;
      trip.slice(fromIdx + 1).forEach(s => reachable.add(s.stop));
    } else {
      const toIdx = trip.findIndex(s => s.stop === fromStop);
      if (toIdx === -1) continue;
      trip.slice(0, toIdx).forEach(s => reachable.add(s.stop));
    }
  }
  return reachable;
}

function filterPicker(q){
  const stops = curIsland==='amrum' ? AMRUM_ROUTE : FOEHR_STOPS;
  const curSel = pickerTarget==='von'?curVon:curNach;
  const other = pickerTarget==='von'?curNach:curVon;

  let reachable = null;
  if (curIsland === 'foehr') {
    if (pickerTarget === 'nach') {
      reachable = getFoehrReachable(curVon, 'von');
    } else {
      reachable = getFoehrReachable(curNach, 'nach');
    }
  }

  document.getElementById("pickerList").innerHTML=stops
    .filter(s=>s.toLowerCase().includes(q.toLowerCase()))
    .map(s=>{
      const isOther = s === other;
      const isDisabled = isOther || (reachable && !reachable.has(s) && s !== curSel);
      return `<div class="picker-item ${s===curSel?'selected':''} ${isDisabled?'disabled':''}"
        onclick="${!isDisabled?`selectStop('${s.replace(/'/g,"\\'")}')`:''}">
        ${s}${s===curSel?' <span>✓</span>':''}
      </div>`;
    }).join("");
}

function selectStop(s){
  if(pickerTarget==="von"){
    curVon=s;
    document.getElementById("vonLabel").textContent=s;
    if(curNach===s){
      const stops=curIsland==='amrum'?AMRUM_ROUTE:FOEHR_STOPS;
      curNach=stops.find(x=>x!==s)||s;
      document.getElementById("nachLabel").textContent=curNach;
    }
  } else {
    curNach=s;
    document.getElementById("nachLabel").textContent=s;
  }
  closePicker();
  render();
}

// Service Worker
let _newWorker=null;
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/Amrum-Busverbindungen-Vorsaison/sw.js").then(reg=>{
    reg.addEventListener("updatefound",()=>{
      _newWorker=reg.installing;
      _newWorker.addEventListener("statechange",()=>{
        if(_newWorker.state==="installed"&&navigator.serviceWorker.controller){
          document.getElementById("updateBanner").style.display="flex";
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener("controllerchange",()=>location.reload());
}
function doUpdate(){if(_newWorker)_newWorker.postMessage({action:"skipWaiting"});}

setInterval(()=>{
  if(!window._manualTime){
    if(document.getElementById("dateinput").value===getTodayStr()){
      document.getElementById("timeinput").value=getNowStr();
      render();
    }
  }
},60000);
document.getElementById("timeinput").addEventListener("change",()=>{window._manualTime=true;render();});
document.getElementById("dateinput").addEventListener("change",()=>{window._manualTime=true;render();});
